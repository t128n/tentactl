name: Feature request
description: Suggest an improvement or new workflow for tentactl.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please explain the problem you are trying to solve and the workflow you want.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is difficult or missing today?
      placeholder: I want to manage repository collaborators as code because...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the command, config shape, or UX you want.
      placeholder: Add support for...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Share workarounds or related tools.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, API references, or examples.
