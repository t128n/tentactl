name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - id: check-maintainer
        uses: actions/github-script@v7
        env:
          GITHUB_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        with:
          script: |
            const username = process.env.GITHUB_TRIGGERING_ACTOR || context.actor
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username,
            })

            const allowed = ['admin', 'maintain', 'write'].includes(data.permission)

            core.info(`Actor ${username} has ${data.permission} permission`)
            core.setOutput('allowed', allowed ? 'true' : 'false')

      - name: Block non-maintainers
        if: steps.check-maintainer.outputs.allowed != 'true'
        run: |
          echo "Blocking CI because the triggering user is not a maintainer"
          exit 1

      - uses: actions/checkout@v4
        if: steps.check-maintainer.outputs.allowed == 'true'
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        if: steps.check-maintainer.outputs.allowed == 'true'
        with:
          version: latest

      - uses: actions/setup-node@v4
        if: steps.check-maintainer.outputs.allowed == 'true'
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        if: steps.check-maintainer.outputs.allowed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Format
        if: steps.check-maintainer.outputs.allowed == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: pnpm format

      - name: Commit formatting changes
        if: steps.check-maintainer.outputs.allowed == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-format"
          branch: ${{ github.event.pull_request.head.ref }}
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Lint
        if: steps.check-maintainer.outputs.allowed == 'true'
        run: pnpm lint

      - name: Test
        if: steps.check-maintainer.outputs.allowed == 'true'
        run: pnpm test -- --run

      - name: Build
        if: steps.check-maintainer.outputs.allowed == 'true'
        run: pnpm build
